<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign Up Page</title>
    <link rel="stylesheet" href="index.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Tirra:wght@400;500;600;700;800;900&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="container">
      <div class="image_section">
        <img
          src="https://images.unsplash.com/photo-1585202900225-6d3ac20a6962?q=80&w=687&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D"
          alt="Profile Picture"
        />
        <div class="logo">
          <img
            src="https://raw.githubusercontent.com/TheOdinProject/curriculum/5f37d43908ef92499e95a9b90fc3cc291a95014c/html_css/project-sign-up-form/odin-lined.png"
            alt="logo"
          />

          <h1>ODIN</h1>
        </div>
        <p>Photo by Halie West on Unsplash</p>
      </div>

      <div class="create">
        <div class="text_section">
          <p style="font-weight: bold">
            This is not a real online service! You know you need something
            <br />
            like this in your life to help you realize your deepest dreams.
            <br />
            Sign up now to get started!
          </p>

          <p>You <em>know</em> you want to</p>
        </div>

        <div class="form_section">
          <h1>Let's Get Started!</h1>
          <form>
            <div class="name">
              <input type="text" placeholder="First Name" required />
              <input type="text" placeholder="Last Name" required />
            </div>
            <div class="user">
              <input type="text" placeholder="Username" required />
              <input type="email" placeholder="Email" required />
            </div>
            <div class="password">
              <input type="password" placeholder="Password" required />
              <input type="password" placeholder="Confirm Password" required />
            </div>
          </form>
        </div>

        <div class="login_section">
          <button type="submit">Create Account</button>
          <p>
            Already have an account?
            <a href="#">Log in</a>
          </p>
        </div>
      </div>
    </div>
  </body>
</html>
